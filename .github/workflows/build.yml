name: Build Mod

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build + Collect Jars
        run: ./gradlew build versionedRelease --stacktrace

      - name: Debug Output (optional but useful)
        run: |
          echo "=== ROOT BUILD ==="
          ls -R build || true
          echo "=== SUBPROJECT BUILDS ==="
          find . -type d -name libs -print -exec ls -l {} \;
          echo "=== RELEASE FOLDER ==="
          ls -R release || true

      - name: Upload Jar Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: release/*.jar
